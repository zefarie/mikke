# 20 requêtes de référence pour mesurer la qualité de recherche (hit@10).
# `q` est ce qu'un humain taperait ; `expect` est le fichier attendu dans
# eval/corpus/. Les requêtes marquées « sémantique » ne partagent presque
# aucun mot avec le document cible : BM25 seul doit échouer, l'hybride non.

[[query]]
q = "facture vétérinaire janvier"
expect = "facture-veterinaire.md"

[[query]] # sémantique
q = "médecin des animaux"
expect = "facture-veterinaire.md"

